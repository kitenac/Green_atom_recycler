#                Workflow/pipeline
#
#  generate db illustration  ---> push to repo
#  
# *each job runs in separate space (paralley) - by default
#
# !!! works via ssh keys (for other access options, i.e. PAT - modify checkout steps everywhere)

name: CI pipeline for Project

# ========== Triggers ==========
on:
  push:
    branches: [ master ]
    paths-ignore: ['data_model_diagram', 'data_model_diagram.svg'] # avoid triggering CI on these diagrams - oughta generate via CI`s pipeline itself: i.e push in repository on passing all the tests - to update Readme with actual DB diagram. push => action => everlasting loop... - so reduce it
  pull_request:
    branches: [ master ]
    paths-ignore: ['data_model_diagram', 'data_model_diagram.svg'] # same

permissions:
  contents: write # "write" perm - to push updated diagrams of DB`s Tables


# ========== Jobs (separate VMs in fact) ==========
jobs: 
  # (ТODO - add pytests to project) Tests
  Unit_tests:
     # needs: Linter_check # TODO - basic linter check before runnin tests 
     runs-on: ubuntu-latest
     container:
      image: debian:stable-slim # convinent way to run Workflow(pipline) on Debian - using container
  
     steps:
      - name: download repository`s files
        uses: actions/checkout@v6
        with:
            ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Prepare APT (next step - auto install + cache with apt)
        run: apt-get update -y
      # custom neat action: download + cache APT libs (could make same with actions/cache@v4 and if clause - which is muuuuch longer)
      - name: (PATCH) download and CACHE missing APT libs 
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: lsb-release python3-pip
          version: 1.0
      
      # caching python - already included
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"


      - name: CACHE python dependencies (up to 10 Gb free storage vanishing every 7 days)
        id: cache-deps-venv    # to refer by id in step bellow
        uses: actions/cache@v4
        with: 
         path: ./myenv
         # uniq key tells if we can reuse cache (checks if it`s same OS + same dependencies (req.txt), othervise - new cache)
         # if key misses (1 st time) - cache uploads in "path" on finishing job
         key:  uuid3-${{ runner.os }}-${{ hashFiles('req.txt') }}


      - name: '[if CACHE miss] Create venv "myenv" (security demand from github runner) and download dependencies in venv'
        # "!= 'true'".  Not "== 'false'" due cache-hit may be '' - empty string
        if: steps.cache-deps-venv.outputs.cache-hit != 'true'
        run: |
         python3 -m venv myenv 
         . myenv/bin/activate && pip install -r req.txt

      # тут будут простые и быстрые тесты функций на логику 
      - name: Test with pytest
        run: . myenv/bin/activate && pytest


  # Auto-generate and push new diagram of DB`s Tables 
  Draw_DB_diagram:
   needs: [Unit_tests]        # generate after ALL CI tests passed 
   runs-on: ubuntu-latest
   container:
    image: debian:stable-slim 

   steps:
     - name: download repository`s files
       uses: actions/checkout@v6
       with:
        ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

     - name: Prepare APT (next step - auto install + cache with apt)
       run: apt-get update -y
     - name: (PATCH) download and CACHE missing APT libs 
       uses: awalsh128/cache-apt-pkgs-action@latest
       with:
        packages: lsb-release python3-pip 
        version: 1.0
        
      
     - name: Set up Python 3.13
       uses: actions/setup-python@v6
       with:
        python-version: "3.13"

     - name: CACHE python dependencies (up to 10 Gb free storage vanishing every 7 days)
       id: cache-deps-venv    
       uses: actions/cache@v4
       with: 
        path: ./myenv  
        key:  uuid-WITH_DRAW_LIBS3-${{ runner.os }}-${{ hashFiles('req.txt') }}

     - name: '[if CACHE miss] Create venv "myenv" (security demand from github runner) and download dependencies in venv'
       if: steps.cache-deps-venv.outputs.cache-hit != 'true'
       run: |
         python3 -m venv myenv 
         . myenv/bin/activate && pip install -r req.txt && pip install sqlalchemy && pip install graphviz
         # setup graphviz lib (requires reinstall xdg-utils) 
         apt-get update -y && apt-get install graphviz -y && apt install -y --reinstall xdg-utils
       
     - name: Generate diagram      
       run: |
        echo 'All CI jobs passed - updating DB tables diagram...' 
        . myenv/bin/activate 
        python3 -m db-visualizer.db-visualizer
    
     - name: Upload Artefact # load illustration of DB in Artefacts (can be accessed from different jobs) 
       uses: actions/upload-artifact@v4
       with:
        name: data_model_diagram
        path: data_model_diagram.svg
        retention-days: 1     # 1 day to hold - minimum

  Push_Artifacts:
   needs: [Draw_DB_diagram]   # push artifacts if all CI tests are passed and all artefacts are made

  # push diagram of DB 
  # TODO: сделай, чтоб несколько артефактов можно было передать на пуш разом, а не по одному
   runs-on: ubuntu-latest
   steps:
    - name: download repository`s files # copy repository bc i use local (in repository) action "my_push_artifact" bellow 
      uses: actions/checkout@v6
      with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Push Artefacts - illustration of DB 
      uses: ./.github/actions/my_push_artifact
      with:
        artifact-name: data_model_diagram
        branch: master
        commit-message: "[CI] pushing Artefacts: Generated newest illustration of DB Tables relationships"
      
  

